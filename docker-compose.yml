version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: schoolgeoresources_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: schoolgeoresources
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: schoolgeoresources_api
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Database=schoolgeoresources;Username=postgres;Password=postgrespassword
    restart: unless-stopped

volumes:
  pgdata:
